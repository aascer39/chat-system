<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WebSocket 聊天测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; background: #f5f5f5; }
        h2 { margin-bottom: 16px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .card h3 { margin-bottom: 12px; font-size: 14px; color: #666; }
        input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input { margin-bottom: 8px; }
        button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #1677ff; color: #fff; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .flex { display: flex; gap: 8px; align-items: center; }
        .flex .grow { flex: 1; }
        #log { background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', monospace; font-size: 13px; padding: 12px; border-radius: 6px; height: 320px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        #log .info { color: #6a9955; }
        #log .error { color: #f44747; }
        #log .recv { color: #569cd6; }
        #log .send { color: #dcdcaa; }
        #status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        #status.dot-off { background: #aaa; }
        #status.dot-ok { background: #52c41a; }
        #status.dot-err { background: #ff4d4f; }
    </style>
</head>
<body>
    <h2>🔌 WebSocket 聊天测试</h2>

    <!-- 步骤 1: 认证 -->
    <div class="card">
        <h3>步骤 1: 登录获取 Token</h3>
        <input id="loginUrl" value="/api/auth/login" placeholder="登录接口路径">
        <div class="flex">
            <input id="username" value="testuser" placeholder="用户名" class="grow">
            <input id="password" type="password" value="123456" placeholder="密码" class="grow">
            <button class="btn-primary" onclick="login()">登录</button>
        </div>
        <div style="margin-top:8px;font-size:13px;color:#666;">
            Token: <span id="tokenDisplay" style="color:#1677ff;word-break:break-all;">（未登录）</span>
        </div>
    </div>

    <!-- 步骤 2: WebSocket 连接 -->
    <div class="card">
        <h3>步骤 2: WebSocket 连接</h3>
        <div class="flex" style="margin-bottom:8px;">
            <input id="wsUrl" value="ws://localhost:8080/ws/chat?token=" placeholder="ws://..." class="grow">
            <span id="status" class="dot-off"></span><span>未连接</span>
        </div>
        <div class="flex">
            <button id="btnConnect" class="btn-success" onclick="connect()">连接</button>
            <button id="btnDisconnect" class="btn-danger" onclick="disconnect()" disabled>断开</button>
        </div>
    </div>

    <!-- 步骤 3: 发送消息 -->
    <div class="card">
        <h3>步骤 3: 发送消息</h3>
        <input id="receiverId" value="2" placeholder="接收者 ID">
        <div class="flex">
            <input id="msgContent" value="你好！" placeholder="消息内容" class="grow">
            <button id="btnSend" class="btn-primary" onclick="sendMsg()" disabled>发送</button>
        </div>
    </div>

    <!-- 日志 -->
    <div class="card">
        <h3>通信日志</h3>
        <div id="log">[系统] 等待操作...</div>
    </div>

    <script>
        let ws = null;
        const BASE = location.protocol + '//' + location.host;

        function log(msg, type = 'info') {
            const el = document.getElementById('log');
            el.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</span>\n`;
            el.scrollTop = el.scrollHeight;
        }

        // ---------- 登录 ----------
        async function login() {
            const url = document.getElementById('loginUrl').value.startsWith('http')
                ? document.getElementById('loginUrl').value
                : BASE + document.getElementById('loginUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            log(`正在登录 ${username}...`);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                const token = data?.data?.token || data?.token;
                if (token) {
                    document.getElementById('tokenDisplay').textContent = token;
                    log('✅ 登录成功，Token 已获取', 'info');
                } else {
                    log('❌ 登录返回数据: ' + JSON.stringify(data), 'error');
                }
                }
            } catch (e) {
                log('❌ 登录请求失败: ' + e.message, 'error');
            }
        }

        // ---------- WebSocket 连接 ----------
        function connect() {
            const token = document.getElementById('tokenDisplay').textContent;
            if (!token || token === '（未登录）') {
                log('⚠️ 请先登录获取 Token', 'error');
                return;
            }
            const url = document.getElementById('wsUrl').value + token;
            log(`正在连接: ws://...${url.slice(-30)}`);

            ws = new WebSocket(url);

            ws.onopen = () => {
                setConnected(true);
                log('✅ WebSocket 已连接', 'info');
            };

            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    log('📩 收到: ' + JSON.stringify(data, null, 2), 'recv');
                } catch {
                    log('📩 收到: ' + e.data, 'recv');
                }
            };

            ws.onerror = (e) => {
                log('❌ WebSocket 错误', 'error');
            };

            ws.onclose = (e) => {
                setConnected(false);
                log(`⚠️ 连接关闭 (code=${e.code}, reason=${e.reason})`, 'error');
                ws = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                setConnected(false);
                log('已断开连接', 'info');
            }
        }

        function setConnected(connected) {
            document.getElementById('status').className = connected ? 'dot-ok' : 'dot-off';
            document.querySelector('#status + span').textContent = connected ? '已连接' : '未连接';
            document.getElementById('btnConnect').disabled = connected;
            document.getElementById('btnDisconnect').disabled = !connected;
            document.getElementById('btnSend').disabled = !connected;
        }

        // ---------- 发送消息 ----------
        function sendMsg() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('⚠️ 连接未建立', 'error');
                return;
            }
            const receiverId = parseInt(document.getElementById('receiverId').value) || 2;
            const content = document.getElementById('msgContent').value || 'hello';
            const msg = { receiverId, content, messageType: 'TEXT' };
            ws.send(JSON.stringify(msg));
            log('📤 发送: ' + JSON.stringify(msg), 'send');
        }
    </script>
</body>
</html>
